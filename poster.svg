<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0%"  stop-color="#2a1414"/>
      <stop offset="60%" stop-color="#170a0a"/>
      <stop offset="100%" stop-color="#0a0606"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </linearGradient>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Neon blobs -->
  <circle cx="200" cy="120" r="220" fill="#E53935" opacity="0.25" filter="url(#glow-red)"/>
  <circle cx="1050" cy="540" r="200" fill="#FFD600" opacity="0.2"  filter="url(#glow-yellow)"/>
  <circle cx="950"  cy="120" r="160" fill="#00C853" opacity="0.18" filter="url(#glow-yellow)"/>

  <!-- Lanterns -->
  <text x="80"  y="120" font-size="70">🏮</text>
  <text x="1080" y="130" font-size="70">🏮</text>
  <text x="120" y="540" font-size="60">🌶️</text>
  <text x="1060" y="560" font-size="60">🍜</text>

  <!-- Brand pill -->
  <rect x="475" y="80" width="250" height="48" rx="24"
        fill="#E53935" filter="url(#glow-red)"/>
  <text x="600" y="113" text-anchor="middle"
        font-family="Trebuchet MS, sans-serif" font-weight="bold"
        font-size="22" fill="#fff">泰有福 · THAI BLESSING</text>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle"
        font-family="Trebuchet MS, sans-serif" font-weight="900"
        font-size="92" fill="url(#title)" filter="url(#glow-yellow)">
    🔥 Thai Cooking
  </text>
  <text x="600" y="330" text-anchor="middle"
        font-family="Trebuchet MS, sans-serif" font-weight="900"
        font-size="92" fill="#E53935" filter="url(#glow-red)">
    CHALLENGE
  </text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle"
        font-family="Trebuchet MS, sans-serif" font-size="32"
        fill="#fff8e7">
    Can you beat 90% of players?
  </text>

  <!-- Reward badge -->
  <rect x="380" y="450" width="440" height="80" rx="40"
        fill="#00C853" filter="url(#glow-yellow)"/>
  <text x="600" y="503" text-anchor="middle"
        font-family="Trebuchet MS, sans-serif" font-weight="bold"
        font-size="34" fill="#0a2010">
    🎁 Win RM10 Voucher
  </text>

  <!-- Footer dishes -->
  <text x="600" y="590" text-anchor="middle" font-size="42">🌶️ 🥭 🦐 🍜 🍋 🥥</text>

  <!-- Brand elephant mascot, tucked in corner -->
  <g transform="translate(60, 80) scale(1.5)">
    <ellipse cx="14" cy="62" rx="13" ry="20" fill="#2C7A3D"/>
    <ellipse cx="86" cy="62" rx="13" ry="20" fill="#2C7A3D"/>
    <ellipse cx="50" cy="60" rx="28" ry="28" fill="#2C7A3D"/>
    <path d="M22 42 Q50 30 78 42 L78 50 Q50 42 22 50 Z" fill="#E53935"/>
    <circle cx="50" cy="36" r="3" fill="#FFD600"/>
    <ellipse cx="38" cy="58" rx="3" ry="3.5" fill="#1a1a1a"/>
    <ellipse cx="62" cy="58" rx="3" ry="3.5" fill="#1a1a1a"/>
    <path d="M50 76 Q50 86 44 90 Q39 94 44 98 Q52 100 56 94"
          stroke="#2C7A3D" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>
</svg>
