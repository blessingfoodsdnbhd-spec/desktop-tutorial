<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#ffd6a5"/>
      <stop offset="50%" stop-color="#ffadad"/>
      <stop offset="100%" stop-color="#ffc8dd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative emojis -->
  <text x="80"   y="140" font-size="80" opacity="0.55">🌿</text>
  <text x="1060" y="160" font-size="80" opacity="0.55">🍋</text>
  <text x="100"  y="560" font-size="80" opacity="0.55">🌶️</text>
  <text x="1060" y="560" font-size="80" opacity="0.55">🥭</text>

  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="180" y="120" width="840" height="400" rx="32" ry="32"
          fill="#fff8e7" stroke="#f4a261" stroke-width="8"/>
  </g>

  <!-- Chef -->
  <text x="600" y="245" font-size="120" text-anchor="middle">👩‍🍳</text>

  <!-- Title -->
  <text x="600" y="320" font-size="54" font-weight="bold" text-anchor="middle"
        fill="#e63946" font-family="Trebuchet MS, sans-serif">
    Chef Mali's Thai Kitchen
  </text>
  <text x="600" y="360" font-size="32" text-anchor="middle"
        fill="#6b4423" font-family="Trebuchet MS, sans-serif">
    瑪莉廚師的泰國廚房
  </text>

  <!-- Dishes -->
  <text x="600" y="450" font-size="80" text-anchor="middle">🍜  🦐  🍛  🥭</text>

  <!-- Tagline -->
  <text x="600" y="500" font-size="22" text-anchor="middle"
        fill="#6b4423" font-family="Trebuchet MS, sans-serif">
    Cook 4 classic Thai dishes • 4 道經典泰國菜
  </text>
</svg>
