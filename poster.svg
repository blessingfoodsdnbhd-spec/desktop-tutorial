<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fff8e7"/>
      <stop offset="50%" stop-color="#ffe6c7"/>
      <stop offset="100%" stop-color="#f4d4a0"/>
    </linearGradient>
    <radialGradient id="elephantGrad" cx="50%" cy="40%">
      <stop offset="0%"  stop-color="#2e7e2e"/>
      <stop offset="100%" stop-color="#0f4f0f"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative emojis -->
  <text x="80"   y="140" font-size="80" opacity="0.55">🌿</text>
  <text x="1060" y="160" font-size="80" opacity="0.55">🍋</text>
  <text x="100"  y="560" font-size="80" opacity="0.55">🌶️</text>
  <text x="1060" y="560" font-size="80" opacity="0.55">🥭</text>

  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="160" y="80" width="880" height="470" rx="32" ry="32"
          fill="#ffffff" stroke="#b89968" stroke-width="6"/>
  </g>

  <!-- Elephant emblem -->
  <circle cx="600" cy="190" r="78" fill="url(#elephantGrad)" stroke="#0a3a0a" stroke-width="3"/>
  <text x="600" y="222" font-size="100" text-anchor="middle">🐘</text>

  <!-- Restaurant name -->
  <text x="600" y="335" font-size="68" font-weight="bold" text-anchor="middle"
        fill="#1a1a1a" font-family="Microsoft JhengHei, PingFang TC, sans-serif">泰有福</text>
  <text x="600" y="380" font-size="32" text-anchor="middle" letter-spacing="4"
        fill="#1a1a1a" font-family="Trebuchet MS, sans-serif">THAI BLESSING FOOD</text>

  <!-- Tagline -->
  <text x="600" y="430" font-size="24" text-anchor="middle"
        fill="#6b4423" font-family="Trebuchet MS, sans-serif">
    Cooking mini-game · 泰式料理小遊戲
  </text>

  <!-- Dishes -->
  <text x="600" y="510" font-size="74" text-anchor="middle">🍜  🦐  🍛  🥭</text>
</svg>
